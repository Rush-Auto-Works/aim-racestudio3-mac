name: release-dmg

# Build, codesign, notarize, staple, and release the RaceStudio 3 DMG.
#
# Runs on a GitHub-hosted macOS runner — NOT Ubicloud. The DMG needs Apple-only tooling
# (osacompile / codesign / hdiutil / notarytool / iconutil / sips) that does not exist on Linux,
# so the org's Ubicloud (Ubuntu) runners can't build it.
#
# Trigger: push a tag like v1.0.0, or run manually (workflow_dispatch — builds an artifact,
# only a tag publishes a Release).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions). See SECRETS section in
# .github/workflows/README.md:
#   DEVELOPER_ID_CERT_P12        base64 of your "Developer ID Application" .p12 export
#   DEVELOPER_ID_CERT_PASSWORD   password used when exporting that .p12
#   KEYCHAIN_PASSWORD            any throwaway string (ephemeral build keychain)
#   ASC_KEY_P8                   base64 of your App Store Connect API key (.p8)
#   ASC_KEY_ID                   the key id (the XXXX in AuthKey_XXXX.p8)
#   ASC_ISSUER_ID                the Issuer ID (UUID) from App Store Connect → Integrations → Keys
# Optional:
#   CODESIGN_IDENTITY                  full identity name; defaults to "Developer ID Application: Samuel Reed (HYBSCYDCMB)"
#   RS3_LOGO_B64                       base64 of the colored RS3 icon PNG (else falls back to the Rush logo)
#   DEVELOPER_ID_INSTALLER_CERT_P12    base64 of your "Developer ID Installer" .p12 export (signs the .pkg)
#   DEVELOPER_ID_INSTALLER_CERT_PASSWORD  password used when exporting that .p12
#   (without the Installer cert the .pkg is still built, just UNSIGNED — fine for MDM push)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create releases / upload assets

concurrency:
  group: release-dmg-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Classify release tag (single source for USB-build + prerelease gates)
        id: tag
        # Both the USB-content gate (the wineusb build step) and the publish prerelease gate read
        # these two outputs, so they can never diverge (a USB build is always a prerelease, never
        # "latest"). The predicate lives in installer/build/classify-tag.sh and is unit-tested.
        run: bash installer/build/classify-tag.sh "${GITHUB_REF_NAME:-}" >> "$GITHUB_OUTPUT"

      - name: Resolve pinned Wine version
        run: |
          set -euo pipefail
          # Single source of truth for the Wine version: pins.env. The bundle, the cache key, and
          # the patched-ws2_32 build all use it, so they can never drift to different Wine versions.
          ver="$(sed -nE 's/^WINE_PINNED_VER="(.*)"/\1/p' installer/src/pins.env)"
          url="$(sed -nE 's/^WINE_PINNED_URL="(.*)"/\1/p' installer/src/pins.env)"
          sha="$(sed -nE 's/^WINE_PINNED_SHA256="(.*)"/\1/p' installer/src/pins.env)"
          [ -n "$ver" ] || { echo "WINE_PINNED_VER not found in pins.env"; exit 1; }
          [ -n "$url" ] || { echo "WINE_PINNED_URL not found in pins.env"; exit 1; }
          [ -n "$sha" ] || { echo "WINE_PINNED_SHA256 not found in pins.env"; exit 1; }
          echo "WINE_VER=$ver" >> "$GITHUB_ENV"
          echo "WINE_URL=$url" >> "$GITHUB_ENV"
          echo "WINE_SHA256=$sha" >> "$GITHUB_ENV"

      - name: Cache pinned Wine tarball
        id: winecache
        uses: actions/cache@5a3ec84eff668545e0b6f57cc1b4e9557e09c4a4  # v4.2.3
        with:
          path: ~/wine-cache
          key: wine-staging-${{ env.WINE_VER }}-osx64

      - name: Fetch Wine if not cached
        run: |
          set -euo pipefail
          mkdir -p ~/wine-cache
          f="$HOME/wine-cache/wine-staging-${WINE_VER}-osx64.tar.xz"
          if [ ! -f "$f" ]; then
            curl -fSL --proto '=https' -o "$f" "$WINE_URL"
          fi
          # Verify the pinned SHA256 before trusting the tarball — guards a poisoned cache
          # (restored from the actions cache) just as much as a tampered download, since both
          # feed straight into the notarized release build.
          got="$(shasum -a 256 "$f" | awk '{print $1}')"
          [ "$got" = "$WINE_SHA256" ] || { echo "Wine tarball checksum mismatch: got $got, want $WINE_SHA256"; exit 1; }
          echo "WINE_TARBALL=$f" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          CERT_B64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PW: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          INSTALLER_CERT_B64: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_P12 }}
          INSTALLER_CERT_PW: ${{ secrets.DEVELOPER_ID_INSTALLER_CERT_PASSWORD }}
          KC_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KC_PW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PW" "$KC"
          printf '%s' "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$CERT_PW" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          # Optional Developer ID *Installer* cert for signing the .pkg (productsign). When its secret
          # isn't set, build-apps emits an UNSIGNED pkg (still MDM-deployable).
          if [ -n "${INSTALLER_CERT_B64:-}" ]; then
            printf '%s' "$INSTALLER_CERT_B64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
            security import "$RUNNER_TEMP/installer.p12" -k "$KC" -P "$INSTALLER_CERT_PW" -T /usr/bin/productsign -T /usr/bin/productbuild
            rm -f "$RUNNER_TEMP/installer.p12"
            echo "imported Developer ID Installer cert — pkg will be signed + notarized"
          else
            echo "no DEVELOPER_ID_INSTALLER_CERT_P12 secret — pkg will be UNSIGNED (MDM-deployable)"
          fi
          # allow codesign/productsign to use the keys without an interactive prompt ("Always Allow")
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KC_PW" "$KC" >/dev/null
          # put our keychain first in the search list so find-identity/codesign see it
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          security find-identity -v "$KC"

      - name: Build patched Wine DLLs (ws2_32 redirect + wlanapi synthetic interface)
        run: |
          set -euo pipefail
          # The macOS 15+/26 Local Network gate drops RS3's WiFi traffic to the dash for the Wine
          # guest. Two patched Wine PE DLLs fix it: wlanapi.dll presents a synthetic connected
          # Wi-Fi interface so RS3 starts discovery, and ws2_32.dll redirects the dash subnet +
          # the 0.0.0.0:36002 discovery target to 127.0.0.1 (and rewrites the reply source back).
          # The root aim-bridge daemon relays loopback <-> dash. Built from source here (not
          # committed) so they track the pinned Wine version. build-apps.sh swaps them in.
          brew install mingw-w64 bison flex
          bash installer/bridge/wine-patch/build-wine-dlls.sh "$WINE_VER"

      - name: Build patched winemac.so (native app-menu items + ⌘Q)
        run: |
          set -euo pipefail
          # RS3's bold macOS app menu is built in winemac.drv's compiled Cocoa. We rebuild that one
          # unix module from a source patch so the menu gains Import / Uninstall / Show Logs items
          # above a ⌘Q Quit. It must be x86_64 (Rosetta) to drop into the osx64 bundle — the build
          # hard-fails if the result is not x86_64. mingw/bison/flex installed in the step above.
          softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          bash installer/wine-patch/build-winemac-so.sh "$WINE_VER"

      - name: Build patched wineusb.so + libusb (USB prereleases only)
        # AiM USB devices (notably the USB-only PDM) are vendor-class WinUSB. Wine's winusb.dll needs
        # the libusb-backed wineusb.sys bus driver, which the Gcenx bundle was built without. We
        # rebuild it (+ an x86_64 libusb) here ONLY for -usb[0-9] prerelease tags, and flip
        # INCLUDE_USB so build-apps step 1f adds it. Same predicate as the publish prerelease gate
        # (classify-tag.sh), so a USB build can never slip out as a stable "latest" release.
        if: steps.tag.outputs.is_usb == 'true'
        run: |
          set -euo pipefail
          softwareupdate --install-rosetta --agree-to-license 2>/dev/null || true
          bash installer/wine-patch/build-wineusb-so.sh "$WINE_VER"
          echo "INCLUDE_USB=1" >> "$GITHUB_ENV"

      - name: Decode RS3 icon (optional)
        env:
          RS3_LOGO_B64: ${{ secrets.RS3_LOGO_B64 }}
        run: |
          set -euo pipefail
          if [ -n "${RS3_LOGO_B64:-}" ]; then
            printf '%s' "$RS3_LOGO_B64" | base64 --decode > installer/build/assets/rs3-logo.png
            echo "decoded RS3 icon"
          else
            echo "no RS3_LOGO_B64 — icon falls back to the Rush logo"
          fi

      - name: Build + notarize + staple the DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          HARDENED_RUNTIME: "1"
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          : "${CODESIGN_IDENTITY:=Developer ID Application: Samuel Reed (HYBSCYDCMB)}"
          export CODESIGN_IDENTITY
          # App Store Connect API key (.p8) for notarytool — decoded from the base64 secret
          printf '%s' "$ASC_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc.p8"
          export NOTARY_KEY="$RUNNER_TEMP/asc.p8"
          bash installer/build/build-apps.sh
          rm -f "$RUNNER_TEMP/asc.p8"

      - name: Verify notarization stapled
        run: |
          set -euo pipefail
          xcrun stapler validate installer/dist/*.dmg
          spctl -a -t open --context context:primary-signature -v installer/dist/*.dmg || true
          for p in installer/dist/*.pkg; do
            [ -e "$p" ] || continue
            xcrun stapler validate "$p" || echo "pkg not stapled (unsigned — expected without the Developer ID Installer cert)"
            spctl -a -t install -v "$p" || true
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@5f0f3fdc3a02e5e3cb39e49fc23f14e01046e9d6  # v4.6.2
        with:
          name: RaceStudio-3-dmg
          path: |
            installer/dist/*.dmg
            installer/dist/*.pkg
          if-no-files-found: error

      - name: Publish Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          IS_USB: ${{ steps.tag.outputs.is_usb }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          # Build the release notes from CHANGELOG.md: a short install line on top, then the
          # section for this tag's version (## [<ver>], everything up to the next ## [ header).
          # Single source of truth — the GitHub release notes track CHANGELOG.md automatically,
          # so a tag is the only manual step. Falls back to just the install line if the version
          # has no CHANGELOG section (awk literal-match avoids the '[' regex pitfall in the header).
          ver="${TAG#v}"   # e.g. 3.83.20-3
          # USB prereleases are the one build whose purpose IS USB — don't tell the tester it's
          # unsupported. Stable/other tags keep the Wi-Fi-only line.
          if [ "${IS_USB:-false}" = true ]; then
            install_line="RaceStudio 3 for macOS (experimental USB build) — drag the AiM folder to Applications. To test USB, install CLEAN (uninstall any existing RaceStudio 3 first), then open once to set up."
          else
            install_line="RaceStudio 3 for macOS — drag the AiM folder to Applications, open once to set up. Connect AiM devices over Wi-Fi or USB (USB support is new and tentative)."
          fi
          body="$(awk -v hdr="## [$ver]" 'index($0,hdr)==1{f=1;next} /^## \[/{if(f)exit} f{print}' CHANGELOG.md)"
          notes_file="$RUNNER_TEMP/relnotes.md"
          if [ -n "$(printf '%s' "$body" | tr -d '[:space:]')" ]; then
            printf '%s\n\n---\n%s\n' "$install_line" "$body" > "$notes_file"
          else
            echo "no CHANGELOG section for $ver — using the install line only" >&2
            printf '%s\n' "$install_line" > "$notes_file"
          fi
          dmg="$(ls installer/dist/*.dmg)"   # versioned name, e.g. RaceStudio3-3.83.20-2.dmg
          # The .pkg is built alongside the DMG (component pkg → /Applications/AiM); ship it too.
          pkg="$(ls installer/dist/*.pkg 2>/dev/null || true)"
          assets="$dmg"; [ -n "$pkg" ] && assets="$assets $pkg"
          # Prerelease tags carry a suffix after the packaging rev (e.g. v3.83.20-5-usb1, -rc1,
          # -beta1, -test). They must NOT become "latest" — they ship experimental builds (e.g. the
          # gated USB support) to a tester, not to everyone.
          # Prerelease decision comes from the same classify-tag.sh predicate as the USB-build gate
          # (step "tag"), so "USB build" and "is a prerelease" can never disagree.
          prerelease_flag=""
          [ "${IS_PRERELEASE:-false}" = true ] && prerelease_flag="--prerelease"
          if gh release view "$TAG" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release upload "$TAG" $assets --clobber
            gh release edit "$TAG" --notes-file "$notes_file"   # refresh notes on a rebuild/re-tag
            # Deleting a tag to re-point it (rebuilding the same version) silently converts its
            # published release into a draft; un-draft it so a re-pushed tag always ships publicly.
            # The classifier (IS_PRERELEASE) is the AUTHORITY for prerelease state — NOT the release's
            # current state on GitHub. Re-deriving from the existing release would let one mis-created
            # as non-prerelease (the old substring bug, or a manual edit) get re-promoted to --latest;
            # setting it explicitly here corrects a wrong state in either direction on the next build.
            # GitHub rejects --latest on a prerelease (HTTP 422), so a prerelease never gets --latest.
            if [ "${IS_PRERELEASE:-false}" = true ]; then
              gh release edit "$TAG" --draft=false --prerelease
            else
              gh release edit "$TAG" --draft=false --prerelease=false --latest
            fi
          else
            # shellcheck disable=SC2086
            gh release create "$TAG" $assets --title "RaceStudio 3 $TAG" --notes-file "$notes_file" $prerelease_flag
          fi
